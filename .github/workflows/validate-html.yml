name: Validate HTML

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      # Ensure JavaScript-based actions run on Node.js 24 where needed
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Use Node.js 24 for linting and JS tools
          node-version: "24"

      - name: Lint HTML files
        run: |
          set -e
          files=$(git ls-files '*.html')
          if [ -z "$files" ]; then
            echo "No HTML files found."
            exit 0
          fi
          echo "$files" | tr '\n' '\0' | xargs -0 npx --yes htmlhint